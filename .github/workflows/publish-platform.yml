name: Publish Platform Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.0.82)'
        required: true
        type: string
      dry-run:
        description: 'Dry run (skip npm publish, still bumps and builds)'
        required: false
        type: boolean
        default: false

concurrency:
  group: publish-platform
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION (expected X.Y.Z)"
            exit 1
          fi

          # Check that this version is higher than what's on npm
          CURRENT=$(npm view @opentabs-dev/shared version 2>/dev/null || echo "0.0.0")
          echo "Current npm version: $CURRENT"
          echo "Target version: $VERSION"

          # Simple comparison — if target equals current, fail
          if [ "$VERSION" = "$CURRENT" ]; then
            echo "::error::Version $VERSION is already published on npm"
            exit 1
          fi

      - name: Bump versions in all platform packages
        run: |
          VERSION="${{ inputs.version }}"
          PACKAGES=(
            platform/shared
            platform/browser-extension
            platform/mcp-server
            platform/plugin-sdk
            platform/plugin-tools
            platform/cli
            platform/create-plugin
          )

          for PKG in "${PACKAGES[@]}"; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$PKG/package.json', 'utf8'));
              pkg.version = '$VERSION';
              // Pin all @opentabs-dev/* cross-refs to ^VERSION at publish time.
              // npm does not transform workspace:* on publish (unlike pnpm), and
              // '^0.0.x' is interpreted as '>=0.0.x <0.0.(x+1)' — an exact pin — so
              // stale ranges like '^0.0.100' would cause consumers to resolve old
              // versions even after a newer publish.
              for (const depMap of [pkg.dependencies, pkg.devDependencies, pkg.peerDependencies]) {
                if (!depMap) continue;
                for (const name of Object.keys(depMap)) {
                  if (name.startsWith('@opentabs-dev/')) {
                    depMap[name] = '^$VERSION';
                  }
                }
              }
              fs.writeFileSync('$PKG/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "Bumped $PKG → $VERSION"
          done

          # Sync Chrome extension manifest.json version
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('platform/browser-extension/manifest.json', 'utf8'));
            manifest.version = '$VERSION';
            fs.writeFileSync('platform/browser-extension/manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          "
          echo "Bumped manifest.json → $VERSION"

      - name: Install dependencies (update lockfile for version changes)
        run: npm install

      - name: Re-format files touched by JSON.stringify so they match biome's formatter
        run: npx @biomejs/biome format --write platform/browser-extension/manifest.json platform/*/package.json

      - name: Build all packages
        run: npm run build:force

      - name: Run quality checks
        run: |
          npm run type-check
          npm run lint
          npm run check:platform-versions
          npm run test

      - name: CLI smoke test (packed tarball)
        run: |
          set -euo pipefail
          SMOKE_DIR=$(mktemp -d)
          export OPENTABS_CONFIG_DIR="$SMOKE_DIR"
          export OPENTABS_TELEMETRY_DISABLED=1
          CLI="node platform/cli/dist/cli.js"

          # Test --version matches the target release version
          VERSION_OUTPUT=$($CLI --version)
          echo "Version: $VERSION_OUTPUT"
          EXPECTED="${{ inputs.version }}"
          if [ "$VERSION_OUTPUT" != "$EXPECTED" ]; then
            echo "::error::Version mismatch: got $VERSION_OUTPUT, expected $EXPECTED"
            exit 1
          fi

          # Test --help exits 0
          $CLI --help > /dev/null
          echo "--help: OK"

          # Test start --show-config exits 0
          $CLI start --show-config > /dev/null
          echo "start --show-config: OK"

          # Test config path outputs an absolute path
          CONFIG_PATH=$($CLI config path)
          echo "config path: $CONFIG_PATH"
          if [[ ! "$CONFIG_PATH" == /* ]]; then
            echo "::error::config path is not absolute: $CONFIG_PATH"
            exit 1
          fi

          # Test doctor (some checks fail without a server — exit 0 or 1 is fine, just no crash)
          $CLI doctor > /dev/null 2>&1 || true
          echo "doctor: OK"

          # Test plugin list (offline mode)
          $CLI plugin list > /dev/null 2>&1 || true
          echo "plugin list: OK"

          # Test telemetry status
          $CLI telemetry status > /dev/null 2>&1 || true
          echo "telemetry status: OK"

          rm -rf "$SMOKE_DIR"
          echo "All CLI smoke tests passed."

      - name: Publish packages to npm (dependency order)
        if: ${{ !inputs.dry-run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          PACKAGES=(
            platform/shared
            platform/browser-extension
            platform/mcp-server
            platform/plugin-sdk
            platform/plugin-tools
            platform/cli
            platform/create-plugin
          )

          for PKG in "${PACKAGES[@]}"; do
            NAME=$(node -p "require('./$PKG/package.json').name")
            echo ""
            echo "Publishing $NAME@$VERSION..."
            (cd "$PKG" && npm publish --access public)
            echo "Published $NAME@$VERSION"
          done

      - name: Update plugin dependencies
        run: |
          VERSION="${{ inputs.version }}"
          OPENTABS_DEPS=("@opentabs-dev/plugin-sdk" "@opentabs-dev/plugin-tools")

          for PLUGIN_DIR in plugins/*/; do
            [ -f "$PLUGIN_DIR/package.json" ] || continue
            # Check if this plugin has opentabs deps
            HAS_DEPS=$(node -p "
              const pkg = require('./$PLUGIN_DIR/package.json');
              const deps = { ...pkg.dependencies, ...pkg.devDependencies };
              ['@opentabs-dev/plugin-sdk', '@opentabs-dev/plugin-tools'].some(d => deps[d]) ? 'yes' : 'no'
            ")
            if [ "$HAS_DEPS" = "no" ]; then
              continue
            fi

            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$PLUGIN_DIR/package.json', 'utf8'));
              const deps = ['@opentabs-dev/plugin-sdk', '@opentabs-dev/plugin-tools'];
              for (const dep of deps) {
                if (pkg.dependencies?.[dep]) pkg.dependencies[dep] = '^$VERSION';
                if (pkg.devDependencies?.[dep]) pkg.devDependencies[dep] = '^$VERSION';
              }
              fs.writeFileSync('$PLUGIN_DIR/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "Updated $PLUGIN_DIR deps → ^$VERSION"
          done

      - name: Wait for npm registry propagation
        if: ${{ !inputs.dry-run }}
        run: |
          VERSION="${{ inputs.version }}"
          echo "Waiting for @opentabs-dev/plugin-sdk@$VERSION to appear on npm..."
          for i in $(seq 1 30); do
            NPM_VER=$(npm view "@opentabs-dev/plugin-sdk@$VERSION" version 2>/dev/null || echo "")
            if [ "$NPM_VER" = "$VERSION" ]; then
              echo "Registry propagated after ${i}0 seconds"
              break
            fi
            sleep 10
          done

      - name: Rebuild plugins with new deps
        if: ${{ !inputs.dry-run }}
        run: |
          for PLUGIN_DIR in plugins/*/; do
            [ -f "$PLUGIN_DIR/package.json" ] || continue
            grep -q '"opentabs"' "$PLUGIN_DIR/package.json" 2>/dev/null || continue
            echo ""
            echo "=== Rebuilding $PLUGIN_DIR ==="
            (cd "$PLUGIN_DIR" && rm -rf node_modules package-lock.json && npm install && npm run build)
          done

      - name: Commit version bumps and create tag
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ inputs.version }}"

          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

          # Stage platform package.json files and manifest.json
          for PKG in platform/*/; do
            git add "$PKG/package.json" || true
          done
          git add platform/browser-extension/manifest.json || true

          # Stage root lockfile
          git add package-lock.json || true

          # Stage plugin changes
          for PLUGIN_DIR in plugins/*/; do
            git add "$PLUGIN_DIR/package.json" || true
            git add "$PLUGIN_DIR/package-lock.json" || true
          done

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit --no-verify -m "release: v${VERSION}"

          # Push with retry (handle concurrent pushes from ralph-consolidator)
          # --no-verify skips pre-push hooks (build already verified above)
          MAX_ATTEMPTS=5
          PUSHED=false
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            if git push --no-verify; then
              echo "Push succeeded on attempt $attempt"
              PUSHED=true
              break
            fi
            echo "Push failed (attempt $attempt/$MAX_ATTEMPTS), rebasing and retrying..."
            sleep $((attempt * 5))
            git pull --rebase origin main
          done

          if [ "$PUSHED" != "true" ]; then
            echo "::error::Failed to push release commit after $MAX_ATTEMPTS attempts"
            exit 1
          fi

          # Create and push tag
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          echo "Tagged and pushed v${VERSION}"

      - name: Summary
        run: |
          VERSION="${{ inputs.version }}"
          DRY_RUN="${{ inputs.dry-run }}"

          echo "## Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$DRY_RUN" = "true" ]; then
            echo "**Mode:** Dry run (no packages published)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Version:** v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Packages published:**" >> "$GITHUB_STEP_SUMMARY"
            for PKG in shared browser-extension mcp-server plugin-sdk plugin-tools cli create-plugin; do
              echo "- @opentabs-dev/${PKG}@${VERSION}" >> "$GITHUB_STEP_SUMMARY"
            done
          fi
