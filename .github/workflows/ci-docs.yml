name: CI — Docs

on:
  push:
    branches: [main]
    paths: ['docs/**']
  pull_request:

concurrency:
  group: ci-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: docs

      - name: Check docs (build + type-check + lint + knip + format)
        run: npm run check
        working-directory: docs
