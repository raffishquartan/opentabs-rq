name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Storybook build
        run: npm run storybook:build

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unused code check
        run: npm run knip

      - name: Unit tests
        run: npm run test

  e2e:
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: '1'
      PW_WORKERS: '3'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build E2E test plugin
        run: cd plugins/e2e-test && npm install && npm run build
        env:
          OPENTABS_SKIP_NOTIFY: '1'

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  plugins:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build platform
        run: npm run build

      - name: Build plugins
        run: npm run build:plugins

      - name: Check plugins
        run: npm run check:plugins

  macos:
    needs: check
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      CI: '1'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: node-modules-macos-${{ hashFiles('package-lock.json') }}
          restore-keys: node-modules-macos-

      - name: Install dependencies
        run: npm ci

      - name: Rebuild esbuild
        run: npm rebuild esbuild

      - name: Build
        run: npm run build

      - name: Build E2E test plugin
        run: cd plugins/e2e-test && npm install --ignore-scripts && npm run build
        env:
          OPENTABS_SKIP_NOTIFY: '1'

      - name: Unit tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-macos
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  windows:
    runs-on: windows-latest
    concurrency:
      group: windows-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test

  windows-e2e:
    needs: windows
    runs-on: windows-latest
    timeout-minutes: 20
    concurrency:
      group: windows-e2e-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build E2E test plugin
        run: cd plugins/e2e-test && npm install --ignore-scripts && npm run build
        env:
          OPENTABS_SKIP_NOTIFY: '1'

      - name: Run Windows E2E tests
        shell: pwsh
        run: |
          $env:OPENTABS_REPO_DIR = $PWD.Path
          $env:OPENTABS_RESULTS_DIR = Join-Path $env:RUNNER_TEMP "windows-results"
          powershell -ExecutionPolicy Bypass -File e2e/windows/run-tests.ps1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: windows-e2e-results
          path: ${{ runner.temp }}/windows-results/
          retention-days: 7
