name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: prev
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV="${{ steps.prev.outputs.tag }}"

          if [ -n "$PREV" ]; then
            RANGE="${PREV}..${TAG}"
          else
            RANGE="${TAG}"
          fi

          # Group commits by conventional commit type
          {
            echo "## What's Changed"
            echo ""

            FEATS=$(git log "$RANGE" --no-merges --pretty=format:'%s' | grep -E '^feat(\(.*\))?:' | sed 's/^feat\([^)]*\)\?: //' || true)
            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo ""
              echo "$FEATS" | while read -r line; do echo "- $line"; done
              echo ""
            fi

            FIXES=$(git log "$RANGE" --no-merges --pretty=format:'%s' | grep -E '^fix(\(.*\))?:' | sed 's/^fix\([^)]*\)\?: //' || true)
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo ""
              echo "$FIXES" | while read -r line; do echo "- $line"; done
              echo ""
            fi

            DOCS=$(git log "$RANGE" --no-merges --pretty=format:'%s' | grep -E '^docs(\(.*\))?:' | sed 's/^docs\([^)]*\)\?: //' || true)
            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo ""
              echo "$DOCS" | while read -r line; do echo "- $line"; done
              echo ""
            fi

            OTHER=$(git log "$RANGE" --no-merges --pretty=format:'%s' | grep -vE '^(feat|fix|docs|chore|ci|style|refactor|test|build|perf|release)(\(.*\))?:' || true)
            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo ""
              echo "$OTHER" | while read -r line; do echo "- $line"; done
              echo ""
            fi

            if [ -n "$PREV" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV}...${TAG}"
            fi
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          generate_release_notes: false
