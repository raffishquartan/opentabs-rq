pre-commit:
  commands:
    reject-ralph-state:
      run: |
        if git diff --cached --name-only | grep -qE '\.ralph/(prd\.json|progress\.txt)$'; then
          echo "ERROR: Ralph state files must not be committed:"
          git diff --cached --name-only | grep -E '\.ralph/(prd\.json|progress\.txt)$'
          echo ""
          echo "Run: git rm --cached <file> to untrack them."
          exit 1
        fi
    auto-stage-lockfiles:
      run: |
        for pkg in $(git diff --cached --name-only | grep 'package\.json$'); do
          lockfile="$(dirname "$pkg")/package-lock.json"
          if [ -f "$lockfile" ] && git diff --name-only -- "$lockfile" | grep -q .; then
            git add "$lockfile"
          fi
        done
    biome-check-ts:
      glob: "*.{ts,tsx}"
      run: npx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    biome-format-json:
      glob: "*.json"
      run: npx biome format --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    biome-format-md:
      glob: "*.md"
      run: npx biome format --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    build:
      run: npm run build
    build-plugins:
      run: npm run build:plugins
    type-check:
      run: npm run type-check
    test:
      run: npm run test
